apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: hlf
spec:
  version: v1.11.0
  homepage: https://github.com/hyperledger/bevel-operator-fabric
  shortDescription: Manage Hyperledger Fabric networks on Kubernetes
  description: |
    kubectl-hlf is a kubectl plugin that helps you manage Hyperledger Fabric
    networks deployed on Kubernetes using the HLF Operator.

    Features:
    - Create and manage Certificate Authorities (CAs)
    - Deploy and configure Peer nodes
    - Set up Orderer services
    - Create and join channels
    - Install and manage chaincode
    - Generate connection profiles
    - Manage identities and enrollments

    Requires the HLF Operator to be installed in your cluster.

  caveats: |
    This plugin requires the HLF Operator to be installed in your Kubernetes cluster.
    Install the operator using Helm:
      helm repo add kfs https://kfsoftware.github.io/hlf-operator
      helm install hlf-operator kfs/hlf-operator

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/hyperledger/bevel-operator-fabric/releases/download/v1.11.0/kubectl-hlf_1.11.0_linux_amd64.tar.gz
      sha256: "PLACEHOLDER_SHA256_LINUX_AMD64"
      bin: kubectl-hlf

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/hyperledger/bevel-operator-fabric/releases/download/v1.11.0/kubectl-hlf_1.11.0_linux_arm64.tar.gz
      sha256: "PLACEHOLDER_SHA256_LINUX_ARM64"
      bin: kubectl-hlf

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/hyperledger/bevel-operator-fabric/releases/download/v1.11.0/kubectl-hlf_1.11.0_darwin_amd64.tar.gz
      sha256: "PLACEHOLDER_SHA256_DARWIN_AMD64"
      bin: kubectl-hlf

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/hyperledger/bevel-operator-fabric/releases/download/v1.11.0/kubectl-hlf_1.11.0_darwin_arm64.tar.gz
      sha256: "PLACEHOLDER_SHA256_DARWIN_ARM64"
      bin: kubectl-hlf

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/hyperledger/bevel-operator-fabric/releases/download/v1.11.0/kubectl-hlf_1.11.0_windows_amd64.zip
      sha256: "PLACEHOLDER_SHA256_WINDOWS_AMD64"
      bin: kubectl-hlf.exe
