# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 10m

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    exclude-functions:
      - io.Copy
      - io.WriteString
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (io.Closer).Close
      - (*os.File).Close
      - (net/http.ResponseWriter).Write
      - (*github.com/spf13/cobra.Command).MarkPersistentFlagRequired
      - (*github.com/spf13/cobra.Command).MarkFlagRequired

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy

  goimports:
    local-prefixes: github.com/kfsoftware/hlf-operator

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      - nilness

  misspell:
    locale: US

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true
      - name: unreachable-code
      - name: redefines-builtin-id

  staticcheck:
    checks:
      - all
      - -SA1019 # Ignore deprecation warnings (many in Fabric SDK)
      - -SA4006 # Ignore unused value assignments (many in existing code)
      - -SA4009 # Ignore overwritten errors before checking (many in existing code)
      - -SA4010 # Ignore unused append results (existing code)
      - -SA9003 # Ignore empty branches (existing code)
      - -SA9009 # Ignore malformed compiler directives (existing code)

  gosec:
    excludes:
      - G101 # Look for hard coded credentials (too many false positives)
      - G104 # Audit errors not checked (covered by errcheck)
      - G304 # File path provided as taint input (necessary for operator)
      - G401 # Use of weak cryptographic primitive (Fabric SDK uses these)
      - G501 # Blocklisted import crypto/md5 (Fabric SDK dependency)
      - G505 # Blocklisted import crypto/sha1 (Fabric SDK dependency)

  nolintlint:
    require-explanation: false
    require-specific: true

linters:
  disable-all: true
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - bodyclose
    - gofmt
    - goimports
    - gosec
    - misspell
    - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

  exclude-dirs:
    - internal
    - pkg/client

  exclude:
    - "error strings should not be capitalized"
    - "error strings should not end with punctuation"

  exclude-rules:
    # Exclude linters from running on auto-generated files
    - path: pkg/client
      linters:
        - revive
        - unused
        - errcheck

    # Exclude linters from running on test files
    - path: _test\.go
      linters:
        - errcheck
        - gosec

    # Exclude linters from generated deep copy files
    - path: zz_generated\.deepcopy\.go
      linters:
        - revive
        - gocritic

    # Allow dot imports in tests (ginkgo/gomega)
    - path: _test\.go
      text: "dot-imports"
      linters:
        - revive

    # Exclude errcheck from kubectl-hlf commands (CLI code with many unchecked writes)
    - path: kubectl-hlf/
      linters:
        - errcheck
        - bodyclose

    # Exclude errcheck from test utilities
    - path: controllers/testutils/
      linters:
        - errcheck

severity:
  default-severity: warning
  rules:
    - linters:
        - govet
      severity: error
